<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Scripture</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* =========================
   THEME VARIABLES
========================= */

:root{
    --bg:#f5f1e8;
    --card:#fffdf8;
    --text:#2d2b28;
    --gold:#b28c45;
    --shadow:0 20px 50px rgba(0,0,0,.15);
    --divider:#d7c6a3;
}

/* Dark mode support */
@media (prefers-color-scheme: dark){
    :root{
        --bg:#181715;
        --card:#22211e;
        --text:#f3f1ed;
        --gold:#d8b768;
        --shadow:0 20px 60px rgba(0,0,0,.4);
        --divider:#3a3328;
    }
}

/* =========================
   BASE LAYOUT
========================= */

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Inter,sans-serif;
    background:linear-gradient(180deg,var(--bg),#e8dfce);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:var(--text);
}

/* =========================
   CARD
========================= */

.card{
    width:100%;
    max-width:520px;
    background:var(--card);
    padding:40px;
    border-radius:24px;
    box-shadow:var(--shadow);
    text-align:center;
    animation:fade .8s ease;
}

/* =========================
   TYPOGRAPHY
========================= */

.cross{
    font-size:42px;
    color:var(--gold);
}

h1{
    font-family:"Cormorant Garamond",serif;
    font-size:42px;
    margin:10px 0;
    font-weight:600;
}

.date{
    opacity:.7;
    margin-bottom:30px;
}

#verse{
    font-family:"Cormorant Garamond",serif;
    font-size:30px;
    line-height:1.4;
    min-height:140px;
}

#reference{
    color:var(--gold);
    font-weight:600;
    margin-top:20px;
    font-size:20px;
}

/* =========================
   DIVIDER
========================= */

hr{
    margin:35px 0;
    border:none;
    height:1px;
    background:var(--divider);
}

/* =========================
   MESSAGE SECTION
========================= */

.message{
    line-height:1.8;
}

/* =========================
   FOOTER
========================= */

.footer{
    margin-top:30px;
    opacity:.6;
    font-size:13px;
}

/* =========================
   BUTTONS
========================= */

button{
    margin-top:18px;
    background:var(--gold);
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:999px;
    cursor:pointer;
    font-size:15px;
    display:block;
    margin-left:auto;
    margin-right:auto;
    transition:0.2s ease;
}

button:hover{
    opacity:.9;
    transform:scale(1.02);
}

#chapterBtn{
    margin-top:12px;
    background:#8a6b2f;
}

/* =========================
   ANIMATION
========================= */

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* small tap effect when loading verse */
.tap {
    animation: tap 0.4s ease;
}

@keyframes tap {
    from { transform: scale(0.98); }
    to { transform: scale(1); }
}

</style>
</head>

<body>

<div class="card" id="card">

    <div class="cross">✝</div>

    <h1>Daily Scripture</h1>

    <div class="date" id="date"></div>

    <div id="verse">Loading today's scripture...</div>

    <div id="reference"></div>

    <button onclick="loadVerse()">Refresh Verse</button>

    <button id="chapterBtn" onclick="openChapter()" style="display:none;">
        Read Full Chapter
    </button>

    <hr>

    <div class="message">

        <strong>To Oliver,</strong>

        <br><br>

        I know we don't always share the same beliefs,
        but I know your faith is important to you.

        I wanted to make something you could carry
        with you every day.

        <br><br>

        Congratulations on your Confirmation.

    </div>

    <div class="footer">
        Made with love ❤️
    </div>

</div>

<script>

const verseEl = document.getElementById("verse");
const refEl = document.getElementById("reference");
const dateEl = document.getElementById("date");
const chapterBtn = document.getElementById("chapterBtn");
const card = document.getElementById("card");

let currentChapter = null;

/* =========================
   DATE DISPLAY
========================= */

dateEl.textContent =
new Date().toLocaleDateString(undefined,{
    weekday:"long",
    year:"numeric",
    month:"long",
    day:"numeric"
});

/* =========================
   LOAD VERSE FROM API
========================= */

async function loadVerse(){

    verseEl.textContent = "Loading today's scripture...";
    refEl.textContent = "";
    chapterBtn.style.display = "none";

    try{

        const response = await fetch(
            "https://thebibleapi.netlify.app/.netlify/functions/verseOfDay?translation=web",
            { cache: "no-cache" }
        );

        if(!response.ok){
            throw new Error("API error");
        }

        const data = await response.json();

        verseEl.textContent = `"${data.text}"`;

        const ref = `${data.book} ${data.chapter}:${data.verse}`;
        refEl.textContent = "— " + ref;

        currentChapter = `${data.book} ${data.chapter}`;
        chapterBtn.style.display = "inline-block";

        // small tap animation
        card.classList.remove("tap");
        void card.offsetWidth;
        card.classList.add("tap");

    }
    catch(error){

        verseEl.textContent = "Unable to load today's scripture.";
        refEl.textContent = "";

        console.error(error);

    }

}

/* =========================
   OPEN FULL CHAPTER
========================= */

function openChapter(){

    if(!currentChapter) return;

    const url =
    "https://www.biblegateway.com/passage/?search=" +
    encodeURIComponent(currentChapter) +
    "&version=WEB";

    window.open(url, "_blank");

}

/* =========================
   INIT
========================= */

loadVerse();

</script>

</body>
</html>
